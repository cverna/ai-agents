apiVersion: batch/v1
kind: CronJob
metadata:
  name: fedora-agent-compose-check
  namespace: communishift-coreos-agent
  labels:
    app: fedora-agent
spec:
  schedule: "0 10 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: fedora-agent
            job: compose-check
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
          containers:
            - name: agent
              image: ghcr.io/cverna/fedora-agent:latest
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e

                  # === Init: Set up writable home directory ===
                  mkdir -p "$HOME/.config/opencode"

                  # === Init: Copy OpenCode configs from image ===
                  cp /opt/opencode-config/opencode.json "$HOME/.config/opencode/"
                  cp /opt/opencode-config/AGENTS.md "$HOME/.config/opencode/"
                  mkdir -p "$HOME/.config/opencode/commands"
                  cp /opt/opencode-commands/*.md "$HOME/.config/opencode/commands/" 2>/dev/null || true
                  mkdir -p "$HOME/.config/opencode/skills"
                  cp -r /opt/opencode-skills/* "$HOME/.config/opencode/skills/"
                  mkdir -p "$HOME/.config/opencode/agents"
                  cp /opt/opencode-agents/*.md "$HOME/.config/opencode/agents/" 2>/dev/null || true

                  echo "============================================"
                  echo "[$(date)] Fedora Agent Compose Check starting..."
                  echo "============================================"

                  # === Run opencode compose failure investigator ===
                  RUN_TITLE="Compose Check $(date +%Y-%m-%d-%H%M)"
                  PROMPT="You are a Fedora Rawhide compose failure analyst. Follow these steps:\n\nStep 1 - Find today's Rawhide issue: run 'date +%Y%m%d', fetch the last 10 open issues from releng/compose-tracker-issues on forge.fedoraproject.org using the gitea-mcp MCP server, filter for titles matching Fedora-Rawhide-{TODAY}. If no issue found, report and stop. If multiple respins, take the highest index. If the issue already has an AI-generated analysis comment, stop.\n\nStep 2 - Triage: load the fedora-compose-triage skill and run all 6 stages (Gather, Parse, Logs, Analyze, Classify, Summarize) using the issue number from Step 1.\n\nStep 3 - Prepare comment: the comment body must contain ONLY the following, in this exact order:\n1. This preamble (markdown formatted exactly as shown):\nThis comment was generated by AI using the [Fedora Skill library](https://forge.fedoraproject.org/ai-ml/skills-library/)\nAlways review AI generated content prior to use\n2. The ### Affected Images section verbatim from Stage 6 output.\n3. The ### Related Bugs section verbatim from Stage 6 output (omit entirely if there are no related bugs).\nDo NOT include any other content, triage stages, parse tables, or analysis.\n\nStep 4 - Post comment: post the comment to the issue using the gitea-mcp MCP server create_issue_comment tool with owner=releng, repo=compose-tracker-issues, and the issue index from Step 1."
                  opencode run \
                    --dangerously-skip-permissions \
                    --format json \
                    --title "$RUN_TITLE" \
                    "$PROMPT"

                  echo "============================================"
                  echo "[$(date)] Compose Check complete: $RUN_TITLE"
                  echo "============================================"
              env:
                - name: GITEA_ACCESS_TOKEN_FILE
                  value: "/run/gitea-secrets/gitea-token"
                - name: HOME
                  value: "/tmp/agent"
              volumeMounts:
                - name: home
                  mountPath: /tmp/agent
                - name: gitea-token
                  mountPath: /run/gitea-secrets
                  readOnly: true
              resources:
                requests:
                  memory: 1Gi
                  cpu: 100m
                limits:
                  memory: 1Gi
                  cpu: 500m
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: false
          volumes:
            - name: home
              emptyDir: {}
            - name: gitea-token
              secret:
                secretName: fedora-agent-secrets
                items:
                  - key: gitea-token
                    path: gitea-token
